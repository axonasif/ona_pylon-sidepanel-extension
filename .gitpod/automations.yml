services:
    KasmVNC:
        name: Kasm Xfce4 VNC Desktop
        description: Runs a Linux Desktop with Google Chrome for testing the extension
        commands:
            ready: until pgrep xfdesktop 1>/dev/null; do sleep 1; done
            start: |
                addr=$(gitpod env port open 5901 -n "VNC Desktop")

                cat <<'EOF'
                ####################################
                ### Kasm VNC Desktop is running! ###
                ###                              ###
                - To access the desktop, open the port 5901 from the "Environment" tab in Ona.
                - Or, open the Ona env in a local IDE like VSCode and use the forwarded port http://localhost:5901
                ###                              ###
                ####################################
                EOF

                vnc
            stop: vncserver -kill :1; sudo service dbus stop
        triggeredBy:
          - postDevcontainerStart

tasks:
    load-extension:
        name: Launch Chrome with extension loaded
        description: Opens Chrome with the side panel extension pre-loaded
        commands:
            start: |
                # Wait for VNC desktop to be ready
                until pgrep xfdesktop 1>/dev/null; do sleep 1; done
                sleep 2

                # Launch Chrome with the extension loaded
                google-chrome \
                  --no-first-run \
                  --disable-default-apps \
                  --load-extension=/workspace/ona_pylon-sidepanel-extension/extension \
                  https://app.usepylon.com/issues &

                echo "Chrome launched with extension loaded. Open the VNC desktop (port 5901) to interact."
        triggeredBy:
          - manual
