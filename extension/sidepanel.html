<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gitpod</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
      padding: 0 12px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      color: #e0e0e0;
      font-size: 13px;
      user-select: none;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-logo {
      width: 18px;
      height: 18px;
      border-radius: 4px;
    }

    .toolbar-title {
      font-weight: 500;
      color: #fff;
    }

    .toolbar-actions {
      display: flex;
      gap: 4px;
    }

    .toolbar-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      transition: background 0.15s, color 0.15s;
    }

    .toolbar-btn:hover {
      background: #333;
      color: #fff;
    }

    .loading-overlay {
      position: absolute;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      z-index: 10;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #FFB45B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 12px;
      color: #888;
      font-size: 13px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    iframe {
      width: 100%;
      height: calc(100% - 40px);
      border: none;
      background: #0d0d0d;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-left">
      <svg class="toolbar-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="6" fill="#FFB45B"/>
        <path d="M10 20V12L16 8L22 12V20L16 24L10 20Z" fill="#0d0d0d"/>
      </svg>
      <span class="toolbar-title">Gitpod</span>
    </div>
    <div class="toolbar-actions">
      <button class="toolbar-btn" id="btn-reload" title="Reload">↻</button>
      <button class="toolbar-btn" id="btn-open" title="Open in new tab">↗</button>
    </div>
  </div>

  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading Gitpod…</div>
  </div>

  <iframe
    id="gitpod-frame"
    src="https://app.gitpod.io"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <script src="sidepanel.js"></script>
</body>
</html>
