<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ona for Pylon</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101115;
      --panel: #17191f;
      --panel-strong: #1f232c;
      --border: #2a2f39;
      --text: #f6f7fb;
      --muted: #9aa3b2;
      --accent: #ffb45b;
      --accent-text: #20170b;
      --danger: #ff8a8a;
      --danger-bg: rgba(255, 138, 138, 0.12);
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1b2130 0%, var(--bg) 48%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    button {
      font: inherit;
    }

    .panel {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
    }

    .panel.immersive {
      padding: 0;
      gap: 0;
    }

    .hidden {
      display: none !important;
    }

    .status-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent), var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .status-card[data-tone="danger"] {
      border-color: rgba(255, 138, 138, 0.28);
      background: linear-gradient(180deg, rgba(255, 138, 138, 0.05), transparent), var(--panel);
    }

    .status-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .status-eyebrow[data-tone="danger"] {
      color: var(--danger);
    }

    .status-title {
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
    }

    .status-body {
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
    }

    .status-meta {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      word-break: break-word;
    }

    .primary-btn {
      align-self: flex-start;
      min-height: 38px;
      padding: 0 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: var(--accent-text);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      box-shadow: 0 10px 20px rgba(255, 180, 91, 0.22);
    }

    .primary-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .primary-btn:disabled {
      opacity: 0.55;
      cursor: default;
      box-shadow: none;
    }

    .status-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .secondary-btn {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .secondary-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .secondary-btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .frame-shell {
      position: relative;
      min-height: 0;
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel.immersive .frame-shell {
      border: none;
      border-radius: 0;
      box-shadow: none;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(16, 17, 21, 0.84);
      z-index: 2;
      transition: opacity 0.22s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      max-width: 260px;
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0d0d0d;
    }

    .frame-controls {
      position: absolute;
      bottom: 10px;
      left: 10px;
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(16, 17, 21, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.32);
      z-index: 3;
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .frame-controls.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .frame-controls-btn {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .frame-controls-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .frame-controls-btn.is-active {
      background: rgba(255, 180, 91, 0.18);
      color: var(--accent);
    }

    .frame-controls-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .frame-controls-btn:disabled:hover {
      background: transparent;
      color: var(--muted);
    }

    .frame-controls-btn.is-armed {
      background: rgba(255, 138, 138, 0.22);
      color: var(--danger);
    }

    .frame-controls-btn.is-armed:hover {
      background: rgba(255, 138, 138, 0.32);
      color: var(--danger);
    }

    .debug-overlay {
      position: absolute;
      bottom: 52px;
      left: 12px;
      right: 12px;
      max-height: 50%;
      overflow: auto;
      padding: 12px 14px;
      background: rgba(18, 20, 26, 0.96);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      color: #d6deeb;
      font-size: 11px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      z-index: 3;
    }

    .floating-notice {
      position: absolute;
      bottom: 52px;
      left: 12px;
      right: 12px;
      padding: 10px 12px;
      background: rgba(255, 138, 138, 0.14);
      border: 1px solid rgba(255, 138, 138, 0.3);
      border-radius: 12px;
      color: #ffd7d7;
      font-size: 12px;
      line-height: 1.45;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      z-index: 4;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="panel" id="panel-root">
    <section class="status-card" id="status-view">
      <div class="status-eyebrow" id="status-eyebrow">Resolving</div>
      <h1 class="status-title" id="status-title">Preparing Ona</h1>
      <p class="status-body" id="status-body">Checking the active Pylon tab and your saved Ona conversation.</p>
      <p class="status-meta hidden" id="status-meta"></p>
      <div class="status-actions">
        <button class="primary-btn hidden" id="primary-action"></button>
        <button class="secondary-btn hidden" id="secondary-action" title="Create with editable prompt" aria-label="Create with editable prompt">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M10.667 2.667a1.414 1.414 0 1 1 2 2L5.333 12H3v-2.333l7.667-7.333Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9.333 4L12 6.667" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </section>

    <div class="frame-shell hidden" id="frame-shell">
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Loading Ona…</div>
      </div>
      <div class="floating-notice hidden" id="floating-notice"></div>
      <iframe
        id="gitpod-frame"
        name="ona-side-panel-frame"
        src="about:blank"
        allow="clipboard-read; clipboard-write"
      ></iframe>
      <pre class="debug-overlay hidden" id="debug-json">Waiting for debug data…</pre>
      <div class="frame-controls" id="frame-controls">
        <button class="frame-controls-btn" id="btn-reload" title="Reload">↻</button>
        <button class="frame-controls-btn" id="btn-open" title="Open in new tab">↗</button>
        <button class="frame-controls-btn" id="btn-debug" title="Toggle debug" aria-label="Toggle debug">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9 7.5V6a3 3 0 0 1 6 0v1.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M8.5 9.5h7a3.5 3.5 0 0 1 3.5 3.5v1a6 6 0 0 1-12 0v-1a3.5 3.5 0 0 1 3.5-3.5Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4.5 11.5 7 12.5M19.5 11.5 17 12.5M5 17l2.5-1M19 17l-2.5-1M12 15v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="frame-controls-btn" id="btn-delete" title="Delete environment">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 5h10M6 5V3.5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1V5M5.5 5l.5 8a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1l.5-8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
